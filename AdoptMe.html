<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopt Me! | MeowBlox</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a0a2e;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        #game-canvas { width: 100vw; height: 100vh; display: block; }

        /* ── HUD ── */
        #hud {
            position: absolute;
            top: 16px; left: 16px;
            display: flex; flex-direction: column; gap: 10px;
            pointer-events: none;
            z-index: 20;
        }

        .hud-card {
            background: rgba(15, 8, 30, 0.82);
            border: 1.5px solid rgba(180, 120, 255, 0.45);
            border-radius: 12px;
            padding: 10px 16px;
            backdrop-filter: blur(8px);
            pointer-events: none;
        }

        #hud-title {
            font-size: 15px;
            font-weight: 700;
            color: #c084fc;
            letter-spacing: 0.5px;
        }

        #hud-user {
            font-size: 11px;
            color: #a78bfa;
            margin-top: 3px;
        }

        #hud-bucks {
            font-size: 14px;
            font-weight: 700;
            color: #86efac;
        }

        /* ── Pet needs bar ── */
        #needs-panel {
            position: absolute;
            top: 16px; right: 16px;
            background: rgba(15, 8, 30, 0.82);
            border: 1.5px solid rgba(180, 120, 255, 0.45);
            border-radius: 12px;
            padding: 12px 16px;
            backdrop-filter: blur(8px);
            min-width: 170px;
            z-index: 20;
            display: none;
        }

        #needs-panel .pet-name {
            font-size: 12px;
            font-weight: 700;
            color: #c084fc;
            margin-bottom: 9px;
        }

        .need-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .need-row:last-child { margin-bottom: 0; }

        .need-icon { font-size: 13px; width: 18px; text-align: center; }

        .need-track {
            flex: 1;
            height: 7px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .need-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.4s ease;
        }

        #fill-hunger { background: linear-gradient(90deg, #fb923c, #fbbf24); }
        #fill-energy { background: linear-gradient(90deg, #60a5fa, #a78bfa); }
        #fill-fun    { background: linear-gradient(90deg, #f472b6, #c084fc); }

        /* ── Floating E prompt ── */
        #e-prompt {
            position: absolute;
            bottom: 28%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 8, 30, 0.9);
            border: 1.5px solid #a78bfa;
            color: #e9d5ff;
            font-size: 13px;
            font-weight: 600;
            padding: 8px 18px;
            border-radius: 20px;
            display: none;
            pointer-events: none;
            z-index: 20;
            white-space: nowrap;
        }

        #e-prompt kbd {
            background: #7c3aed;
            color: #fff;
            padding: 1px 7px;
            border-radius: 5px;
            font-size: 12px;
            font-family: inherit;
        }

        /* ── Panels ── */
        .panel-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 40;
        }

        .panel-box {
            background: #0f0820;
            border: 1.5px solid rgba(180,120,255,0.5);
            border-radius: 16px;
            width: 92%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 0 0 8px 0;
            box-shadow: 0 20px 60px rgba(124,58,237,0.25);
        }

        .panel-head {
            padding: 16px 20px 12px;
            border-bottom: 1px solid rgba(180,120,255,0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-head h2 {
            font-size: 16px;
            font-weight: 700;
            color: #c084fc;
        }

        .close-btn {
            background: none;
            border: none;
            color: #a78bfa;
            font-size: 20px;
            cursor: pointer;
            line-height: 1;
            padding: 0 4px;
        }

        .close-btn:hover { color: #fff; }

        .panel-body { padding: 14px 20px; display: flex; flex-direction: column; gap: 10px; }

        .shop-row {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(180,120,255,0.15);
            border-radius: 10px;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .shop-info { display: flex; flex-direction: column; gap: 3px; }
        .shop-name { font-size: 13px; font-weight: 600; color: #e9d5ff; }
        .shop-sub  { font-size: 11px; color: #a78bfa; }
        .shop-price { font-size: 11px; color: #86efac; font-weight: 600; }

        .buy-btn {
            background: #7c3aed;
            color: #fff;
            border: none;
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .buy-btn:hover { background: #6d28d9; }
        .buy-btn:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }

        .fuse-btn {
            background: linear-gradient(135deg, #0ea5e9, #7c3aed);
            color: #fff;
            border: none;
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .section-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6b7280;
            padding: 4px 0 2px;
        }

        .divider { border: none; border-top: 1px solid rgba(180,120,255,0.12); }

        /* ── Toast ── */
        #toast-wrap {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 50;
            pointer-events: none;
        }

        .toast {
            background: rgba(15, 8, 30, 0.95);
            border: 1.5px solid rgba(180,120,255,0.5);
            color: #e9d5ff;
            font-size: 13px;
            font-weight: 600;
            padding: 9px 20px;
            border-radius: 20px;
            white-space: nowrap;
            animation: toastIn 0.2s ease;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Controls legend ── */
        #controls-hint {
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: rgba(15, 8, 30, 0.7);
            border: 1px solid rgba(180,120,255,0.2);
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 11px;
            color: #6b7280;
            pointer-events: none;
            z-index: 20;
            line-height: 1.7;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-canvas"></div>

<!-- HUD -->
<div id="hud">
    <div class="hud-card">
        <div id="hud-title">🏡 Adopt Me!</div>
        <div id="hud-user">Guest</div>
    </div>
    <div class="hud-card">
        <div id="hud-bucks">💚 100 Bucks</div>
    </div>
</div>

<!-- Pet needs -->
<div id="needs-panel">
    <div class="pet-name" id="needs-name">Pet</div>
    <div class="need-row">
        <span class="need-icon">🍖</span>
        <div class="need-track"><div class="need-fill" id="fill-hunger" style="width:100%"></div></div>
    </div>
    <div class="need-row">
        <span class="need-icon">⚡</span>
        <div class="need-track"><div class="need-fill" id="fill-energy" style="width:100%"></div></div>
    </div>
    <div class="need-row">
        <span class="need-icon">🎾</span>
        <div class="need-track"><div class="need-fill" id="fill-fun" style="width:100%"></div></div>
    </div>
</div>

<!-- E prompt -->
<div id="e-prompt">Press <kbd>E</kbd> to <span id="e-action">interact</span></div>

<!-- Nursery panel -->
<div id="nursery-panel" class="panel-overlay hidden">
    <div class="panel-box">
        <div class="panel-head">
            <h2>🥚 Nursery</h2>
            <button class="close-btn" onclick="closePanel()">×</button>
        </div>
        <div class="panel-body" id="nursery-body"></div>
    </div>
</div>

<!-- Pet care panel -->
<div id="care-panel" class="panel-overlay hidden">
    <div class="panel-box">
        <div class="panel-head">
            <h2 id="care-title">Care for Pet</h2>
            <button class="close-btn" onclick="closePanel()">×</button>
        </div>
        <div class="panel-body" id="care-body"></div>
    </div>
</div>

<!-- Toasts -->
<div id="toast-wrap"></div>

<!-- Controls -->
<div id="controls-hint">WASD — Move &nbsp;·&nbsp; E — Interact</div>

<script>
    // ─────────────────────────────────────────────
    //  SAVE / PROFILE
    // ─────────────────────────────────────────────
    let username = "Guest";
    let avatarColors = { skin: "#f1c27d", shirt: "#7c3aed", pants: "#1e3799" };

    function loadProfile() {
        try {
            const key = sessionStorage.getItem('mb_active_session');
            const db  = JSON.parse(localStorage.getItem('mb_users_db') || '{}');
            if (key && db[key]) {
                const p = db[key];
                username = p.user || "Guest";
                if (p.avatar) {
                    avatarColors.skin  = p.avatar.skin  || avatarColors.skin;
                    avatarColors.shirt = p.avatar.shirt || avatarColors.shirt;
                    avatarColors.pants = p.avatar.pants || avatarColors.pants;
                }
            }
        } catch(_) {}
        document.getElementById('hud-user').textContent = username;
    }

    const SAVE_KEY = () => 'mb_am_' + username.toLowerCase();
    let gs = null;

    function defaultSave() {
        return { bucks: 100, pets: [], activePet: null, eggs: [] };
    }

    function loadSave() {
        try {
            const raw = localStorage.getItem(SAVE_KEY());
            gs = raw ? Object.assign(defaultSave(), JSON.parse(raw)) : defaultSave();
        } catch(_) { gs = defaultSave(); }
    }

    let _saveTimer = null;
    function save() {
        clearTimeout(_saveTimer);
        _saveTimer = setTimeout(() => {
            try { localStorage.setItem(SAVE_KEY(), JSON.stringify(gs)); } catch(_) {}
        }, 500);
    }

    function updateBucksHud() {
        document.getElementById('hud-bucks').textContent = `💚 ${gs.bucks} Bucks`;
    }

    function addBucks(n) { gs.bucks += n; updateBucksHud(); save(); }

    function spendBucks(n) {
        if (gs.bucks < n) { toast("Not enough Bucks!"); return false; }
        gs.bucks -= n; updateBucksHud(); save(); return true;
    }

    // ─────────────────────────────────────────────
    //  TOAST
    // ─────────────────────────────────────────────
    function toast(msg) {
        const wrap = document.getElementById('toast-wrap');
        const el = document.createElement('div');
        el.className = 'toast';
        el.textContent = msg;
        wrap.appendChild(el);
        setTimeout(() => {
            el.style.opacity = '0';
            el.style.transition = 'opacity 0.3s';
            setTimeout(() => el.remove(), 320);
        }, 2500);
    }

    // ─────────────────────────────────────────────
    //  PET SPECIES
    // ─────────────────────────────────────────────
    const SPECIES = {
        cat:     { name:"Cat",     emoji:"🐱", price:50,  rarity:"Common",    body:0xe2b87a, accent:0xfde6c4 },
        dog:     { name:"Dog",     emoji:"🐶", price:50,  rarity:"Common",    body:0x8b6343, accent:0xf5deb3 },
        unicorn: { name:"Unicorn", emoji:"🦄", price:600, rarity:"Legendary", body:0xe879f9, accent:0xfdf4ff },
    };

    const STAGES = ["Newborn","Junior","Teen","Full Grown"];
    const XP_PER_STAGE = [25, 50, 90];
    const HATCH_MS = 15000;
    const DECAY = 0.5;
    const COOLDOWN = 4000;

    function newPet(species) {
        return {
            id: 'p' + Date.now(),
            species,
            stage: 0, xp: 0,
            hunger: 100, energy: 100, fun: 100,
            isNeon: false, isMegaNeon: false,
            lastCare: 0
        };
    }

    function getActive() {
        if (!gs.activePet) return null;
        return gs.pets.find(p => p.id === gs.activePet) || null;
    }

    // ─────────────────────────────────────────────
    //  THREE.JS SCENE
    // ─────────────────────────────────────────────
    let scene, camera, renderer, clock;
    let playerGroup, petGroup = null;
    let petMeshMap = new Map();

    const KEYS = { w:false, a:false, s:false, d:false };
    const SPEED = 5;
    const CAM_OFFSET = new THREE.Vector3(0, 8, 14);

    function initScene() {
        const container = document.getElementById('game-canvas');
        scene    = new THREE.Scene();
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 0.85;
        container.appendChild(renderer.domElement);

        camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.1, 500);
        camera.position.set(0, 8, 14);

        clock  = new THREE.Clock();

        // Sky gradient background
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.FogExp2(0xadd8e6, 0.012);

        // Lighting — soft, not washed out
        scene.add(new THREE.AmbientLight(0xfff8f0, 0.45));

        const sun = new THREE.DirectionalLight(0xfffbe8, 1.1);
        sun.position.set(20, 40, 20);
        sun.castShadow = true;
        sun.shadow.mapSize.set(2048, 2048);
        sun.shadow.camera.near = 0.5;
        sun.shadow.camera.far  = 200;
        sun.shadow.camera.left = sun.shadow.camera.bottom = -50;
        sun.shadow.camera.right = sun.shadow.camera.top  =  50;
        scene.add(sun);

        const fill = new THREE.DirectionalLight(0xd0e8ff, 0.3);
        fill.position.set(-15, 10, -10);
        scene.add(fill);

        buildWorld();
        buildPlayer();
        if (getActive()) spawnPetMesh(getActive());
        renderNurseryPanel();
    }

    // ─────────────────────────────────────────────
    //  WORLD
    // ─────────────────────────────────────────────
    let nurseryMesh;

    function buildWorld() {
        // Ground
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(200, 200),
            new THREE.MeshStandardMaterial({ color: 0x5abf5e, roughness: 0.95, metalness: 0 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Stone path
        const path = new THREE.Mesh(
            new THREE.PlaneGeometry(2.4, 8),
            new THREE.MeshStandardMaterial({ color: 0xbdbdbd, roughness: 0.9 })
        );
        path.rotation.x = -Math.PI / 2;
        path.position.set(0, 0.01, 6);
        path.receiveShadow = true;
        scene.add(path);

        buildHouse();
        buildNursery();
        buildTrees();
    }

    function buildHouse() {
        const h = new THREE.Group();

        // Walls
        const walls = new THREE.Mesh(
            new THREE.BoxGeometry(9, 5.5, 7),
            new THREE.MeshStandardMaterial({ color: 0xfff8e7, roughness: 0.65 })
        );
        walls.position.y = 2.75;
        walls.castShadow = walls.receiveShadow = true;
        h.add(walls);

        // Roof
        const roofS = new THREE.Shape();
        roofS.moveTo(-5, 0); roofS.lineTo(0, 3.2); roofS.lineTo(5, 0); roofS.lineTo(-5, 0);
        const roof = new THREE.Mesh(
            new THREE.ExtrudeGeometry(roofS, { depth: 7.6, bevelEnabled: false }),
            new THREE.MeshStandardMaterial({ color: 0xd9534f, roughness: 0.5 })
        );
        roof.position.set(0, 5.5, -3.8);
        roof.castShadow = true;
        h.add(roof);

        // Door
        const door = new THREE.Mesh(
            new THREE.BoxGeometry(1.4, 2.6, 0.12),
            new THREE.MeshStandardMaterial({ color: 0x5b9bff, roughness: 0.4 })
        );
        door.position.set(0, 1.3, 3.51);
        h.add(door);

        const doorFrame = new THREE.Mesh(
            new THREE.BoxGeometry(1.8, 2.9, 0.08),
            new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 })
        );
        doorFrame.position.set(0, 1.45, 3.5);
        h.add(doorFrame);

        // Windows
        [[-2.8, 3, 3.51], [2.8, 3, 3.51]].forEach(([x, y, z]) => {
            const frame = new THREE.Mesh(
                new THREE.BoxGeometry(1.6, 1.6, 0.08),
                new THREE.MeshStandardMaterial({ color: 0xffffff })
            );
            frame.position.set(x, y, z);
            h.add(frame);
            const glass = new THREE.Mesh(
                new THREE.BoxGeometry(1.3, 1.3, 0.06),
                new THREE.MeshStandardMaterial({ color: 0xbae6fd, transparent: true, opacity: 0.55, roughness: 0.05 })
            );
            glass.position.set(x, y, z + 0.02);
            h.add(glass);
        });

        // Chimney
        const chimney = new THREE.Mesh(
            new THREE.BoxGeometry(0.8, 2, 0.8),
            new THREE.MeshStandardMaterial({ color: 0xc0392b, roughness: 0.8 })
        );
        chimney.position.set(2.5, 7.5, 0);
        chimney.castShadow = true;
        h.add(chimney);

        h.position.set(0, 0, -3);
        scene.add(h);
    }

    function buildNursery() {
        const n = new THREE.Group();

        const base = new THREE.Mesh(
            new THREE.BoxGeometry(4, 3, 4),
            new THREE.MeshStandardMaterial({ color: 0xfce7f3, roughness: 0.6 })
        );
        base.position.y = 1.5;
        base.castShadow = base.receiveShadow = true;
        n.add(base);

        const roof = new THREE.Mesh(
            new THREE.ConeGeometry(3.2, 2, 4),
            new THREE.MeshStandardMaterial({ color: 0xf9a8d4, roughness: 0.5 })
        );
        roof.position.y = 4;
        roof.rotation.y = Math.PI / 4;
        roof.castShadow = true;
        n.add(roof);

        // Egg sign
        const egg = new THREE.Mesh(
            new THREE.SphereGeometry(0.42, 12, 12),
            new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 })
        );
        egg.scale.set(0.8, 1.15, 0.8);
        egg.position.set(0, 0.55, 2.1);
        n.add(egg);

        n.position.set(-11, 0, 3);
        nurseryMesh = n;
        scene.add(n);
    }

    function buildTrees() {
        const positions = [[-6,0,-9],[6,0,-9],[-14,0,6],[14,0,6],[-8,0,12],[9,0,14],[0,0,-15],[-4,0,16],[5,0,-18]];
        positions.forEach(([x,y,z]) => {
            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.22, 0.3, 1.6, 8),
                new THREE.MeshStandardMaterial({ color: 0x795548, roughness: 0.9 })
            );
            trunk.position.set(x, 0.8, z);
            trunk.castShadow = true;
            scene.add(trunk);

            const leaves = new THREE.Mesh(
                new THREE.SphereGeometry(1.3, 10, 10),
                new THREE.MeshStandardMaterial({ color: 0x2e7d32, roughness: 0.85 })
            );
            leaves.position.set(x, 3, z);
            leaves.castShadow = true;
            scene.add(leaves);
        });
    }

    // ─────────────────────────────────────────────
    //  PLAYER
    // ─────────────────────────────────────────────
    let headM, torsoM, lArmM, rArmM, lLegM, rLegM;

    function buildPlayer() {
        playerGroup = new THREE.Group();

        const skin  = new THREE.MeshStandardMaterial({ color: avatarColors.skin,  roughness: 0.7 });
        const shirt = new THREE.MeshStandardMaterial({ color: avatarColors.shirt, roughness: 0.7 });
        const pants = new THREE.MeshStandardMaterial({ color: avatarColors.pants, roughness: 0.7 });

        // Head
        headM = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.9, 0.9), skin);
        headM.position.y = 0.45;
        headM.castShadow = true;

        // Torso
        torsoM = new THREE.Mesh(new THREE.BoxGeometry(1.1, 1.2, 0.65), shirt);
        torsoM.position.y = -0.35;
        torsoM.castShadow = true;

        // Arms — pivot at shoulder
        const armGeo = new THREE.BoxGeometry(0.4, 1.1, 0.45);
        lArmM = new THREE.Mesh(armGeo, skin);
        lArmM.position.set(-0.77, -0.35, 0);
        lArmM.castShadow = true;

        rArmM = new THREE.Mesh(armGeo, skin);
        rArmM.position.set(0.77, -0.35, 0);
        rArmM.castShadow = true;

        // Legs
        const legGeo = new THREE.BoxGeometry(0.45, 1.1, 0.5);
        lLegM = new THREE.Mesh(legGeo, pants);
        lLegM.position.set(-0.28, -1.5, 0);
        lLegM.castShadow = true;

        rLegM = new THREE.Mesh(legGeo, pants);
        rLegM.position.set(0.28, -1.5, 0);
        rLegM.castShadow = true;

        [headM, torsoM, lArmM, rArmM, lLegM, rLegM].forEach(m => playerGroup.add(m));

        // Place at ground level: lowest point of rig is bottom of legs
        // lLegM.position.y = -1.5, leg height = 1.1, so bottom = -1.5 - 0.55 = -2.05
        // We need that to be y=0, so group.position.y = 2.05
        playerGroup.position.set(0, 2.05, 9);
        scene.add(playerGroup);
    }

    // ─────────────────────────────────────────────
    //  PET MESH
    // ─────────────────────────────────────────────
    function buildPetMesh(pet) {
        const sp   = SPECIES[pet.species];
        const body = new THREE.MeshStandardMaterial({ color: sp.body, roughness: 0.7, emissive: pet.isNeon ? 0x66ffee : 0, emissiveIntensity: 0.4 });
        const acc  = new THREE.MeshStandardMaterial({ color: sp.accent, roughness: 0.5 });
        const g    = new THREE.Group();

        const torso = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.4, 0.75), body);
        torso.position.y = 0.38;
        torso.castShadow = true;
        g.add(torso);

        const head = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.38, 0.4), body);
        head.position.set(0, 0.54, 0.48);
        head.castShadow = true;
        g.add(head);

        if (pet.species === 'unicorn') {
            const horn = new THREE.Mesh(new THREE.ConeGeometry(0.06, 0.28, 6), acc);
            horn.position.set(0, 0.8, 0.52);
            g.add(horn);
        } else {
            [[-0.14, 0], [0.14, 0]].forEach(([ex, _]) => {
                const ear = new THREE.Mesh(new THREE.ConeGeometry(0.07, 0.14, 4), body);
                ear.position.set(ex, 0.74, 0.46);
                g.add(ear);
            });
        }

        const legGeo = new THREE.BoxGeometry(0.12, 0.26, 0.12);
        [[-0.19, 0.12, 0.26], [0.19, 0.12, 0.26], [-0.19, 0.12, -0.26], [0.19, 0.12, -0.26]].forEach(([lx,ly,lz]) => {
            const leg = new THREE.Mesh(legGeo, body);
            leg.position.set(lx, ly, lz);
            g.add(leg);
        });

        const stageScale = 0.55 + (pet.stage / (STAGES.length - 1)) * 0.7;
        g.scale.setScalar(stageScale);
        return g;
    }

    function spawnPetMesh(pet) {
        if (!pet) return;
        clearPetMesh();
        petGroup = buildPetMesh(pet);
        petGroup.position.copy(playerGroup.position);
        petGroup.position.x -= 1.2;
        scene.add(petGroup);
        petMeshMap.set(pet.id, petGroup);
    }

    function clearPetMesh() {
        if (petGroup) { scene.remove(petGroup); petGroup = null; }
        petMeshMap.clear();
    }

    // ─────────────────────────────────────────────
    //  INTERACTION ZONES
    // ─────────────────────────────────────────────
    const NURSERY_POS = new THREE.Vector3(-11, 0, 3);
    const PET_INTERACT_DIST = 2.2;
    const NURSERY_DIST      = 3.5;

    let currentZone = null;

    function checkZones() {
        const pp = playerGroup.position;
        const ep = document.getElementById('e-prompt');
        const ea = document.getElementById('e-action');

        const nearNursery = pp.distanceTo(NURSERY_POS) < NURSERY_DIST;
        const active      = getActive();
        const nearPet     = active && petGroup && pp.distanceTo(petGroup.position) < PET_INTERACT_DIST;

        if (nearNursery) {
            currentZone = 'nursery';
            ea.textContent = 'open Nursery';
            ep.style.display = 'block';
        } else if (nearPet) {
            currentZone = 'pet';
            ea.textContent = 'care for ' + SPECIES[active.species].name;
            ep.style.display = 'block';
        } else {
            currentZone = null;
            ep.style.display = 'none';
        }
    }

    function handleE() {
        if (!currentZone) return;
        if (currentZone === 'nursery') openNursery();
        if (currentZone === 'pet')     openCare();
    }

    // ─────────────────────────────────────────────
    //  NURSERY
    // ─────────────────────────────────────────────
    function openNursery() {
        document.getElementById('nursery-panel').classList.remove('hidden');
        renderNurseryPanel();
    }

    function renderNurseryPanel() {
        const body = document.getElementById('nursery-body');
        body.innerHTML = '';

        // Fuse section if eligible
        const fusionRows = buildFusionRows();
        if (fusionRows.length > 0) {
            const lbl = document.createElement('div');
            lbl.className = 'section-label';
            lbl.textContent = '✨ Neon Fusion';
            body.appendChild(lbl);
            fusionRows.forEach(r => body.appendChild(r));
            const hr = document.createElement('hr');
            hr.className = 'divider';
            body.appendChild(hr);
        }

        const lbl2 = document.createElement('div');
        lbl2.className = 'section-label';
        lbl2.textContent = '🥚 Buy Egg';
        body.appendChild(lbl2);

        Object.entries(SPECIES).forEach(([key, sp]) => {
            const row = document.createElement('div');
            row.className = 'shop-row';
            row.innerHTML = `
                <div class="shop-info">
                    <div class="shop-name">${sp.emoji} ${sp.name} Egg</div>
                    <div class="shop-sub">${sp.rarity}</div>
                    <div class="shop-price">💚 ${sp.price} Bucks</div>
                </div>`;
            const btn = document.createElement('button');
            btn.className = 'buy-btn';
            btn.textContent = 'Buy';
            btn.onclick = () => buyEgg(key);
            row.appendChild(btn);
            body.appendChild(row);
        });

        if (gs.eggs.length > 0) {
            const hr2 = document.createElement('hr');
            hr2.className = 'divider';
            body.appendChild(hr2);
            const lbl3 = document.createElement('div');
            lbl3.className = 'section-label';
            lbl3.textContent = '⏳ Incubating';
            body.appendChild(lbl3);
            gs.eggs.forEach(egg => {
                const rem = Math.max(0, Math.ceil((egg.hatchesAt - Date.now()) / 1000));
                const sp  = SPECIES[egg.species];
                const row = document.createElement('div');
                row.className = 'shop-row';
                row.innerHTML = `<div class="shop-info"><div class="shop-name">${sp.emoji} ${sp.name} Egg</div><div class="shop-sub">Hatches in ${rem}s</div></div>`;
                body.appendChild(row);
            });
        }
    }

    function buildFusionRows() {
        const rows = [];
        Object.entries(SPECIES).forEach(([key, sp]) => {
            const fg = gs.pets.filter(p => p.species === key && p.stage === STAGES.length - 1 && !p.isNeon && !p.isMegaNeon);
            if (fg.length >= 4) {
                const row = document.createElement('div');
                row.className = 'shop-row';
                row.innerHTML = `<div class="shop-info"><div class="shop-name" style="color:#a78bfa">✨ Neon ${sp.name}</div><div class="shop-sub">Fuse 4 Full Grown ${sp.name}s</div></div>`;
                const btn = document.createElement('button');
                btn.className = 'fuse-btn';
                btn.textContent = 'Fuse!';
                btn.onclick = () => fuseNeon(key, false);
                row.appendChild(btn);
                rows.push(row);
            }
            const neons = gs.pets.filter(p => p.species === key && p.isNeon && !p.isMegaNeon);
            if (neons.length >= 4) {
                const row = document.createElement('div');
                row.className = 'shop-row';
                row.innerHTML = `<div class="shop-info"><div class="shop-name" style="color:#38bdf8">✨ Mega Neon ${sp.name}</div><div class="shop-sub">Fuse 4 Neon ${sp.name}s</div></div>`;
                const btn = document.createElement('button');
                btn.className = 'fuse-btn';
                btn.textContent = 'Fuse!';
                btn.onclick = () => fuseNeon(key, true);
                row.appendChild(btn);
                rows.push(row);
            }
        });
        return rows;
    }

    function buyEgg(species) {
        const sp = SPECIES[species];
        if (!spendBucks(sp.price)) return;
        gs.eggs.push({ id: 'e' + Date.now(), species, hatchesAt: Date.now() + HATCH_MS });
        save();
        toast(`${sp.emoji} ${sp.name} Egg incubating — hatches in ${HATCH_MS/1000}s!`);
        renderNurseryPanel();
    }

    function fuseNeon(species, mega) {
        const sp  = SPECIES[species];
        const src = mega
            ? gs.pets.filter(p => p.species === species && p.isNeon && !p.isMegaNeon)
            : gs.pets.filter(p => p.species === species && p.stage === STAGES.length - 1 && !p.isNeon && !p.isMegaNeon);
        if (src.length < 4) return;
        const ids = src.slice(0, 4).map(p => p.id);
        gs.pets = gs.pets.filter(p => !ids.includes(p.id));
        if (ids.includes(gs.activePet)) { gs.activePet = null; clearPetMesh(); }
        const np = newPet(species);
        np.stage = STAGES.length - 1;
        np.isNeon = true;
        if (mega) np.isMegaNeon = true;
        gs.pets.push(np);
        gs.activePet = np.id;
        spawnPetMesh(np);
        save();
        toast(`✨ ${mega ? 'Mega Neon' : 'Neon'} ${sp.name} created!`);
        closePanel();
    }

    // ─────────────────────────────────────────────
    //  PET CARE PANEL
    // ─────────────────────────────────────────────
    function openCare() {
        const pet = getActive();
        if (!pet) return;
        const sp = SPECIES[pet.species];
        document.getElementById('care-title').textContent = `${sp.emoji} Care for ${pet.name || sp.name}`;
        const body = document.getElementById('care-body');
        body.innerHTML = '';

        const cooldown = Date.now() - pet.lastCare < COOLDOWN;

        const actions = [
            { label: '🍖 Feed', key: 'hunger',  reward: 5  },
            { label: '😴 Rest', key: 'energy',  reward: 4  },
            { label: '🎾 Play', key: 'fun',     reward: 6  },
        ];

        actions.forEach(a => {
            const row = document.createElement('div');
            row.className = 'shop-row';
            row.innerHTML = `<div class="shop-info"><div class="shop-name">${a.label}</div><div class="shop-price">+${a.reward} Bucks · +8 XP</div></div>`;
            const btn = document.createElement('button');
            btn.className = 'buy-btn';
            btn.textContent = 'Do it';
            btn.disabled = cooldown;
            if (cooldown) btn.title = 'Pet needs a moment!';
            btn.onclick = () => doCare(a.key, a.reward);
            row.appendChild(btn);
            body.appendChild(row);
        });

        const info = document.createElement('div');
        info.style.cssText = 'font-size:11px; color:#6b7280; margin-top:4px;';
        info.textContent = `Stage: ${STAGES[pet.stage]}  ·  XP: ${pet.xp}/${XP_PER_STAGE[pet.stage] || '—'}`;
        body.appendChild(info);

        document.getElementById('care-panel').classList.remove('hidden');
    }

    function doCare(need, reward) {
        const pet = getActive();
        if (!pet) return;
        if (Date.now() - pet.lastCare < COOLDOWN) { toast("Pet needs a moment!"); return; }
        pet.lastCare = Date.now();
        pet[need] = Math.min(100, pet[need] + 35);
        addBucks(reward);
        grantXp(pet, 8);
        save();
        updateNeedsHud(pet);
        closePanel();
        toast(`+${reward} Bucks! ${SPECIES[pet.species].name} loved that 💜`);
    }

    function grantXp(pet, amt) {
        if (pet.stage >= STAGES.length - 1) return;
        pet.xp += amt;
        if (pet.xp >= XP_PER_STAGE[pet.stage]) {
            pet.xp -= XP_PER_STAGE[pet.stage];
            pet.stage++;
            const sp = SPECIES[pet.species];
            toast(`${sp.emoji} ${sp.name} grew to ${STAGES[pet.stage]}!`);
            if (petGroup) {
                const s = 0.55 + (pet.stage / (STAGES.length - 1)) * 0.7;
                petGroup.scale.setScalar(s);
            }
            if (pet.stage === STAGES.length - 1) {
                const fg = gs.pets.filter(p => p.species === pet.species && p.stage === STAGES.length - 1 && !p.isNeon);
                if (fg.length >= 4) toast(`✨ You can now fuse a Neon ${SPECIES[pet.species].name} at the Nursery!`);
            }
        }
    }

    // ─────────────────────────────────────────────
    //  NEEDS HUD
    // ─────────────────────────────────────────────
    function updateNeedsHud(pet) {
        const panel = document.getElementById('needs-panel');
        if (!pet) { panel.style.display = 'none'; return; }
        panel.style.display = 'block';
        const sp = SPECIES[pet.species];
        document.getElementById('needs-name').textContent =
            `${sp.emoji} ${sp.name} · ${STAGES[pet.stage]}${pet.isMegaNeon ? ' ✨MN' : pet.isNeon ? ' ✨N' : ''}`;
        document.getElementById('fill-hunger').style.width = pet.hunger + '%';
        document.getElementById('fill-energy').style.width = pet.energy + '%';
        document.getElementById('fill-fun').style.width    = pet.fun    + '%';
    }

    // ─────────────────────────────────────────────
    //  HATCH + NEEDS DECAY LOOP (1s interval)
    // ─────────────────────────────────────────────
    setInterval(() => {
        if (!gs) return;

        // Hatch eggs
        const still = [];
        gs.eggs.forEach(egg => {
            if (Date.now() >= egg.hatchesAt) {
                const np = newPet(egg.species);
                gs.pets.push(np);
                if (!gs.activePet) { gs.activePet = np.id; spawnPetMesh(np); }
                toast(`${SPECIES[egg.species].emoji} Your egg hatched! Say hi to your new ${SPECIES[egg.species].name}!`);
                renderNurseryPanel();
            } else { still.push(egg); }
        });
        gs.eggs = still;

        // Decay needs
        const pet = getActive();
        if (pet) {
            pet.hunger = Math.max(0, pet.hunger - DECAY);
            pet.energy = Math.max(0, pet.energy - DECAY * 0.8);
            pet.fun    = Math.max(0, pet.fun    - DECAY * 0.6);
            updateNeedsHud(pet);
        }

        save();
    }, 1000);

    // ─────────────────────────────────────────────
    //  PANEL CLOSE
    // ─────────────────────────────────────────────
    function closePanel() {
        document.getElementById('nursery-panel').classList.add('hidden');
        document.getElementById('care-panel').classList.add('hidden');
    }

    // Click outside panel box to close
    document.querySelectorAll('.panel-overlay').forEach(el => {
        el.addEventListener('click', e => { if (e.target === el) closePanel(); });
    });

    // ─────────────────────────────────────────────
    //  INPUT
    // ─────────────────────────────────────────────
    window.addEventListener('keydown', e => {
        const k = e.key.toLowerCase();
        if (['w','a','s','d'].includes(k)) KEYS[k] = true;
        if (k === 'e') { e.preventDefault(); handleE(); }
        if (e.key === 'Escape') closePanel();
    });
    window.addEventListener('keyup', e => {
        const k = e.key.toLowerCase();
        if (['w','a','s','d'].includes(k)) KEYS[k] = false;
    });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ─────────────────────────────────────────────
    //  GAME LOOP
    // ─────────────────────────────────────────────
    function loop() {
        requestAnimationFrame(loop);
        const dt = Math.min(clock.getDelta(), 0.05);
        const t  = clock.getElapsedTime ? clock.getElapsedTime() : Date.now() * 0.001;
        const elapsed = Date.now() * 0.001;

        // Movement
        let dx = 0, dz = 0;
        if (KEYS.w) dz -= 1;
        if (KEYS.s) dz += 1;
        if (KEYS.a) dx -= 1;
        if (KEYS.d) dx += 1;

        const moving = dx !== 0 || dz !== 0;

        if (moving) {
            const len = Math.hypot(dx, dz);
            dx /= len; dz /= len;
            playerGroup.position.x += dx * SPEED * dt;
            playerGroup.position.z += dz * SPEED * dt;
            playerGroup.rotation.y = Math.atan2(dx, dz);

            lLegM.rotation.x =  Math.sin(elapsed * 10) * 0.5;
            rLegM.rotation.x = -Math.sin(elapsed * 10) * 0.5;
            lArmM.rotation.x = -Math.sin(elapsed * 10) * 0.4;
            rArmM.rotation.x =  Math.sin(elapsed * 10) * 0.4;
        } else {
            // Idle breathe
            lLegM.rotation.x = 0;
            rLegM.rotation.x = 0;
            lArmM.rotation.x = Math.sin(elapsed * 1.8) * 0.04;
            rArmM.rotation.x = -Math.sin(elapsed * 1.8) * 0.04;
            playerGroup.position.y = 2.05 + Math.sin(elapsed * 1.8) * 0.02;
        }

        // Camera follow
        const target = playerGroup.position.clone().add(CAM_OFFSET);
        camera.position.lerp(target, 0.08);
        camera.lookAt(playerGroup.position.x, playerGroup.position.y + 1.2, playerGroup.position.z);

        // Pet follow
        if (petGroup) {
            const behind = new THREE.Vector3(
                playerGroup.position.x - Math.sin(playerGroup.rotation.y) * 1.6,
                petGroup.position.y,
                playerGroup.position.z - Math.cos(playerGroup.rotation.y) * 1.6
            );
            petGroup.position.lerp(behind, 0.06);
            petGroup.position.y = Math.abs(Math.sin(elapsed * 3.5)) * 0.06;
        }

        // Zone check
        checkZones();

        renderer.render(scene, camera);
    }

    // ─────────────────────────────────────────────
    //  INIT
    // ─────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
        loadProfile();
        loadSave();
        updateBucksHud();
        initScene();
        updateNeedsHud(getActive());
        loop();
    });
</script>
</body>
</html>
